name: Release

on:
  push:
    tags:
      - "v*"  # 只在推送v开头的tag时触发
  workflow_dispatch:  # 支持手动触发
    inputs:
      version_override:
        description: 'Override version (leave empty to use git tag)'
        required: false
        type: string
      build_docker:
        description: 'Build and push Docker images'
        required: false
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: false
      sync_to_public:
        description: 'Sync release to public repository'
        required: false
        type: boolean
        default: true

# 使用concurrency确保同时只有一个工作流运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 预检步骤：判断是否继续运行完整工作流
  pre_check:
    name: Check Trigger Event
    runs-on: ubuntu-latest
    outputs:
      should_run_full_workflow: ${{ steps.check.outputs.should_run }}
      is_tag_or_release: ${{ steps.check.outputs.is_tag_or_release }}
      should_create_release: ${{ steps.check.outputs.should_create_release }}
      should_sync_to_public: ${{ steps.check.outputs.should_sync_to_public }}
      version: ${{ steps.get_version.outputs.version }}
      docker_version: ${{ steps.get_version.outputs.docker_version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning
      
      - name: Determine event type
        id: check
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          
          # 如果是tag推送，则运行完整工作流包括Docker和Release
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "This is a tag push event - will run full workflow"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "is_tag_or_release=true" >> $GITHUB_OUTPUT
            echo "should_create_release=true" >> $GITHUB_OUTPUT
            echo "should_sync_to_public=true" >> $GITHUB_OUTPUT
          # 如果是手动触发且指定构建Docker，则运行完整工作流
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "This is a manual trigger - will run full workflow"
            echo "should_run=true" >> $GITHUB_OUTPUT
            if [[ "${{ github.event.inputs.build_docker }}" == "true" ]]; then
              echo "is_tag_or_release=true" >> $GITHUB_OUTPUT
            else
              echo "is_tag_or_release=false" >> $GITHUB_OUTPUT
            fi
            if [[ "${{ github.event.inputs.create_release }}" == "true" ]]; then
              echo "should_create_release=true" >> $GITHUB_OUTPUT
            else
              echo "should_create_release=false" >> $GITHUB_OUTPUT
            fi
            if [[ "${{ github.event.inputs.sync_to_public }}" == "true" ]]; then
              echo "should_sync_to_public=true" >> $GITHUB_OUTPUT
            else
              echo "should_sync_to_public=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "This is an unexpected event - will not run"
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "is_tag_or_release=false" >> $GITHUB_OUTPUT
            echo "should_create_release=false" >> $GITHUB_OUTPUT
            echo "should_sync_to_public=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          fi
          
          # 提取不带v前缀的版本号用于Docker镜像标签
          DOCKER_VERSION=$(echo "$VERSION" | sed 's/^v//')
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "docker_version=$DOCKER_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION (Docker version: $DOCKER_VERSION)"

  # 1. 测试阶段
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: pre_check
    if: needs.pre_check.outputs.should_run_full_workflow == 'true'
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      # 设置Node.js环境用于构建前端
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      
      # 构建前端
      - name: Build web frontend
        run: |
          echo "Building web frontend..."
          cd web
          npm ci
          # 设置CI=false以避免将ESLint警告视为错误
          CI=false npm run build
          cd ..
          # 验证构建结果
          echo "Checking web build output:"
          ls -la web/build/
          echo "Web frontend built successfully. It will be embedded in the Go binary using //go:embed"

      - name: Get dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  # 2. 构建可执行文件
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [pre_check, test]  # 依赖预检和测试
    if: needs.pre_check.outputs.should_run_full_workflow == 'true'
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning
      
      # 获取依赖
      - name: Get dependencies
        run: go mod download
        
      # 注意：前端已在测试阶段构建完成，这里直接使用
      # 验证web/build目录是否存在
      - name: Verify web build exists
        run: |
          if [ -d "web/build" ]; then
            echo "Web build directory exists, checking contents:"
            ls -la web/build/
          else
            echo "Web build directory does not exist, creating it from test stage..."
            # 设置Node.js环境并构建前端
            # 设置Node.js环境用于构建前端
            echo "Setting up Node.js environment..."
            cd web
            npm ci
            # 设置CI=false以避免将ESLint警告视为错误
            CI=false npm run build
            cd ..
            echo "Checking web build output:"
            ls -la web/build/
          fi
      
      # 编译不同平台的二进制文件
      - name: Build binaries
        run: |
          mkdir -p build
          
          # 验证web前端构建文件是否存在（这些文件将被Go的embed功能嵌入到二进制文件中）
          echo "Checking web frontend build files for embedding into Go binary:"
          ls -la web/build/
          echo "These files will be embedded into the Go binary via //go:embed directive in main.go"
          
          # 现在使用纯Go实现的SQLite，可以禁用CGO简化构建
          
          # Linux amd64
          echo "Building for Linux AMD64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ needs.pre_check.outputs.version }}" -o build/license-linux-amd64 ./main.go
          
          # Linux arm64
          echo "Building for Linux ARM64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${{ needs.pre_check.outputs.version }}" -o build/license-linux-arm64 ./main.go
          
          # MacOS amd64
          echo "Building for MacOS AMD64..."
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ needs.pre_check.outputs.version }}" -o build/license-darwin-amd64 ./main.go
          
          # MacOS arm64
          echo "Building for MacOS ARM64..."
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${{ needs.pre_check.outputs.version }}" -o build/license-darwin-arm64 ./main.go
          
          # Windows amd64
          echo "Building for Windows AMD64..."
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ needs.pre_check.outputs.version }}" -o build/license-windows-amd64.exe ./main.go
          
          # 检查编译的二进制文件
          echo "Built binaries:"
          ls -la build/
          file build/*

      # 上传所有平台的二进制文件
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: build/*

  # 3. 构建Docker镜像（只在tag或手动触发时运行）
  docker:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: [pre_check, build]  # 依赖预检和构建
    if: needs.pre_check.outputs.is_tag_or_release == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      # 下载构建的二进制文件
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: build

      # 验证下载的二进制文件
      - name: Verify binaries
        run: |
          echo "Downloaded binaries:"
          ls -la build/
          # 二进制文件已经包含前端资源（通过Go embed功能）

      # 准备Docker构建上下文
      - name: Prepare build context
        run: |
          # 创建构建上下文目录
          mkdir -p docker-context
          
          # 检查下载的二进制文件
          echo "Downloaded binaries:"
          ls -la build/
          
          # 将二进制文件重命名为更简单的形式（删除linux-前缀）
          mkdir -p docker-context/bin
          cp build/license-linux-amd64 docker-context/bin/license-amd64
          cp build/license-linux-arm64 docker-context/bin/license-arm64
          
          # 检查复制后的二进制文件
          echo "Copied binaries:"
          ls -la docker-context/bin/
          
          # 创建Dockerfile，避免使用TARGETARCH变量
          cat > docker-context/Dockerfile << EOF
          FROM alpine:latest
          
          ARG VERSION=${{ needs.pre_check.outputs.docker_version }}
          ARG TARGETARCH
          
          WORKDIR /app
          
          # 调试: 打印目标架构
          RUN echo "Building for architecture: \${TARGETARCH}"
          
          # 复制对应架构的预编译二进制文件（已包含前端资源）
          COPY bin/license-\${TARGETARCH} /app/license
          
          # 基本依赖
          RUN chmod +x /app/license && \\
              apk update && \\
              apk upgrade && \\
              apk add --no-cache ca-certificates tzdata && \\
              update-ca-certificates 2>/dev/null || true && \\
              mkdir -p /data
          
          # 验证二进制文件
          RUN ls -la /app && chmod +x /app/license
              
          ENTRYPOINT ["/app/license"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.HUB_USER }}
          password: ${{ secrets.HUB_PASS }}

      # 使用buildx一步构建多架构镜像
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker-context
          push: true
          tags: |
            ${{ secrets.HUB_USER }}/${{ secrets.HUB_REPO }}:${{ needs.pre_check.outputs.docker_version }}
            ${{ secrets.HUB_USER }}/${{ secrets.HUB_REPO }}:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.pre_check.outputs.docker_version }}

  # 4. 发布Release（只在tag推送时运行或手动指定创建release时运行）
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [pre_check, build, docker]  # 依赖预检、构建和Docker
    if: needs.pre_check.outputs.is_tag_or_release == 'true' && (startsWith(github.ref, 'refs/tags/') || needs.pre_check.outputs.should_create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: build

      - name: Create checksums
        run: |
          cd build
          # 为所有二进制文件创建校验和
          find . -type f -not -name "checksums.txt" -exec shasum -a 256 {} \; > checksums.txt
          cat checksums.txt

      - name: Get previous tag
        id: previoustag
        run: |
          # 获取当前标签
          CURRENT_TAG="${{ needs.pre_check.outputs.version }}"
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          
          # 获取上一个标签
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_TAG^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          
          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Generate Release Body
        id: release_body
        run: |
          CURRENT_TAG="${{ steps.previoustag.outputs.current_tag }}"
          PREVIOUS_TAG="${{ steps.previoustag.outputs.previous_tag }}"
          
          # 移除标题，避免重复
          echo "## 📝 Changelog" > release_body.md
          echo "" >> release_body.md
          
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Full Changelog: [$PREVIOUS_TAG...$CURRENT_TAG](https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$CURRENT_TAG)" >> release_body.md
            echo "" >> release_body.md
            
            # 获取提交日志并分类
            echo "### 🚀 Features" >> release_body.md
            git log --pretty=format:"* %s" $PREVIOUS_TAG..$CURRENT_TAG | grep -i "feat\|feature\|新增\|添加" >> release_body.md || echo "* No new features" >> release_body.md
            echo "" >> release_body.md
            
            echo "### 🐛 Bug Fixes" >> release_body.md
            git log --pretty=format:"* %s" $PREVIOUS_TAG..$CURRENT_TAG | grep -i "fix\|修复\|bug" >> release_body.md || echo "* No bug fixes" >> release_body.md
            echo "" >> release_body.md
            
            echo "### ♻️ Other Changes" >> release_body.md
            git log --pretty=format:"* %s" $PREVIOUS_TAG..$CURRENT_TAG | grep -v -i "feat\|feature\|fix\|bug\|新增\|添加\|修复" >> release_body.md || echo "* No other changes" >> release_body.md
          else
            echo "🎉 First Release" >> release_body.md
          fi
      
      - name: Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.pre_check.outputs.version }}
          name: ${{ needs.pre_check.outputs.version }}
          artifacts: "build/*"
          allowUpdates: true
          makeLatest: true
          replacesArtifacts: true
          bodyFile: release_body.md
          
      # 同步发布到公开仓库，只在手动触发时执行，不在tag推送时执行
      - name: Sync Release to Public Repository
        if: needs.pre_check.outputs.should_sync_to_public == 'true' && !startsWith(github.ref, 'refs/tags/')
        env:
          # 必须使用有权限访问目标仓库的个人访问令牌(PAT)
          # github.token无法访问其他仓库，即使在同一组织内
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          RELEASE_TAG: ${{ needs.pre_check.outputs.version }}
          BUILD_DIR: ${{ github.workspace }}/build
          BODY_FILE: ${{ github.workspace }}/release_body.md
        run: |
          echo "Syncing release to public repository..."
          
          # 确保我们有足够的权限使用GitHub CLI
          gh auth status
          
          # 检查目标仓库是否存在相同的tag
          echo "Checking if tag exists in public repository..."
          if gh api repos/${{ secrets.PUBLIC_REPO }}/releases/tags/$RELEASE_TAG --silent; then
            echo "Release with tag $RELEASE_TAG already exists in public repository, will update it"
            # 获取已存在release的ID
            RELEASE_ID=$(gh api repos/${{ secrets.PUBLIC_REPO }}/releases/tags/$RELEASE_TAG --jq '.id')
            
            # 删除现有release (但保留tag)
            echo "Deleting existing release..."
            gh api -X DELETE repos/${{ secrets.PUBLIC_REPO }}/releases/$RELEASE_ID
          else
            echo "Release doesn't exist in public repository, will create a new one"
          fi
          
          # 创建新release
          echo "Creating release in public repository..."
          gh release create $RELEASE_TAG \
            --repo ${{ secrets.PUBLIC_REPO }} \
            --title "$RELEASE_TAG" \
            --notes-file $BODY_FILE \
            $BUILD_DIR/*
          
          echo "Release successfully synced to ${{ secrets.PUBLIC_REPO }} repository!"

