<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 更丰富的渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5433FF" />
      <stop offset="50%" stop-color="#20BDFF" />
      <stop offset="100%" stop-color="#A5FECB" />
    </linearGradient>
    
    <!-- 霓虹效果渐变 -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00E4" />
      <stop offset="100%" stop-color="#00E1FF" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- 细致阴影 -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  
  <!-- 主背景 - 圆角矩形 -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#bgGradient)" filter="url(#softShadow)" />
  
  <!-- 装饰图形 - 模糊圆 -->
  <circle cx="40" cy="40" r="60" fill="#5433FF" opacity="0.1" />
  <circle cx="160" cy="160" r="60" fill="#A5FECB" opacity="0.1" />
  
  <!-- 抽象数字线条 - 增强 -->
  <g opacity="0.7">
    <line x1="30" y1="50" x2="70" y2="50" stroke="white" stroke-width="1.5" />
    <line x1="35" y1="55" x2="65" y2="55" stroke="white" stroke-width="1.5" />
    <line x1="40" y1="60" x2="60" y2="60" stroke="white" stroke-width="1.5" />
    <line x1="130" y1="140" x2="170" y2="140" stroke="white" stroke-width="1.5" />
    <line x1="135" y1="145" x2="165" y2="145" stroke="white" stroke-width="1.5" />
    <line x1="140" y1="150" x2="160" y2="150" stroke="white" stroke-width="1.5" />
    <!-- 增加更多线条 -->
    <line x1="30" y1="65" x2="50" y2="65" stroke="white" stroke-width="1.5" />
    <line x1="145" y1="135" x2="165" y2="135" stroke="white" stroke-width="1.5" />
  </g>
  
  <!-- 中央图形 - 抽象化钥匙 - 放大和居中 -->
  <g transform="translate(100, 100) scale(1.8)">
    <!-- 钥匙头 - 霓虹效果 -->
    <circle cx="0" cy="-10" r="12" fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#neonGlow)" />
    <circle cx="0" cy="-10" r="6" fill="white" opacity="0.8" />
    
    <!-- 钥匙身 - 连接线 -->
    <line x1="0" y1="0" x2="0" y2="20" stroke="white" stroke-width="3" stroke-linecap="round" />
    
    <!-- 钥匙齿 - 抽象几何形状 -->
    <g transform="translate(0, 15)">
      <path d="M0,0 L15,0 L12,6 L3,6 Z" fill="white" />
      <path d="M0,9 L10,9 L8,15 L2,15 Z" fill="white" />
    </g>
  </g>
  
  <!-- 数字矩阵 - 代表技术感 - 更多元素 -->
  <g fill="white" opacity="0.6" transform="translate(130, 60)">
    <rect x="0" y="0" width="8" height="8" rx="1" />
    <rect x="10" y="0" width="8" height="8" rx="1" />
    <rect x="20" y="0" width="8" height="8" rx="1" />
    <rect x="0" y="10" width="8" height="8" rx="1" />
    <rect x="10" y="10" width="8" height="8" rx="1" />
    <rect x="20" y="10" width="8" height="8" rx="1" />
    <rect x="0" y="20" width="8" height="8" rx="1" />
    <rect x="10" y="20" width="8" height="8" rx="1" />
  </g>
  
  <!-- 左侧添加对称数字矩阵 -->
  <g fill="white" opacity="0.4" transform="translate(35, 60)">
    <rect x="0" y="0" width="6" height="6" rx="1" />
    <rect x="8" y="0" width="6" height="6" rx="1" />
    <rect x="16" y="0" width="6" height="6" rx="1" />
    <rect x="0" y="8" width="6" height="6" rx="1" />
    <rect x="8" y="8" width="6" height="6" rx="1" />
    <rect x="0" y="16" width="6" height="6" rx="1" />
  </g>
  
  <!-- 波浪线 - 动态视觉元素 - 增强 -->
  <path d="M45,135 Q60,125 75,135 Q90,145 105,135 Q120,125 135,135" 
        stroke="white" stroke-width="2" fill="none" opacity="0.8" />
  
  <!-- 额外的装饰元素 - 替代文字 -->
  <circle cx="100" cy="155" r="3" fill="white" opacity="0.9" />
  <circle cx="90" cy="155" r="2" fill="white" opacity="0.7" />
  <circle cx="110" cy="155" r="2" fill="white" opacity="0.7" />
  <circle cx="80" cy="155" r="1" fill="white" opacity="0.5" />
  <circle cx="120" cy="155" r="1" fill="white" opacity="0.5" />
</svg> 